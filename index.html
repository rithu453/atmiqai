<!DOCTYPE html>
<html>
<head>
  <title>Personal Tone AI</title>
</head>
<body>

<h2>Your Personal Tone Chatbot</h2>

<textarea id="userdata" placeholder="Paste 5-10 lines of your own writing here..." rows="6" cols="60"></textarea>
<br><br>

<input id="question" placeholder="Ask something..." size="60"/>
<button onclick="sendData()">Ask AI</button>

<h3>AI Response:</h3>
<div id="response"></div>

<script>
async function sendData() {
  const data = {
    samples: document.getElementById("userdata").value,
    question: document.getElementById("question").value
  };

  const res = await fetch("http://localhost:8000/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  const result = await res.json();
  document.getElementById("response").innerText = result.answer;
}
</script>

</body>
</html>
